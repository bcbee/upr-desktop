name: release

# Build, sign/notarize, and publish to GitHub Releases on a version tag (e.g. v2.0.0).
#
# Prerequisites:
# - Push the latest send-keys-native and send-keys-native-windows to GitHub; this
#   workflow checks them out as siblings so the app's `file:../` deps resolve.
# - Required secrets:
#     GH_TOKEN                       PAT with `repo` scope (publish + sibling checkout)
#     MAC_CSC_LINK                   base64 of the Developer ID Application .p12
#     MAC_CSC_KEY_PASSWORD           password for that .p12
#     APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID   notarization creds
#
# This builds the SIGNED release line. The one-off unsigned 1.3.2 bridge is built
# locally — see the README "Release process" section.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Artifacts and the update feed (latest*.yml) are stamped with package.json's
  # version, not the tag — a mismatch publishes a release whose metadata points
  # at the wrong version, which the installed clients then ignore or mis-download.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION. Bump package.json (or fix the tag) before releasing."
            exit 1
          fi
          # The 1.3.x transitional bridge is built locally and UNSIGNED (see the
          # README release process); letting CI sign+notarize it would put mixed
          # signed/unsigned artifacts on the same version.
          case "$PKG_VERSION" in
            1.3.*)
              echo "::error::Version $PKG_VERSION is on the unsigned bridge line — build it locally, not via this workflow."
              exit 1
              ;;
          esac

  macos:
    needs: verify-version
    runs-on: macos-14 # arm64 runner; builds both arches
    steps:
      - uses: actions/checkout@v4
        with:
          path: upr-desktop
      - uses: actions/checkout@v4
        with:
          repository: brendancboyle/send-keys-native
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native
      - uses: actions/checkout@v4
        with:
          repository: brendancboyle/send-keys-native-windows
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native-windows
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: upr-desktop
        run: npm install
      - name: Build
        working-directory: upr-desktop
        run: npm run build
      - name: Package, sign, notarize & publish
        working-directory: upr-desktop
        run: npx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: upr-desktop
      - uses: actions/checkout@v4
        with:
          repository: brendancboyle/send-keys-native
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native
      - uses: actions/checkout@v4
        with:
          repository: brendancboyle/send-keys-native-windows
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native-windows
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (compiles the native addon for the Electron ABI)
        working-directory: upr-desktop
        run: npm install
      - name: Build
        working-directory: upr-desktop
        run: npm run build
      - name: Package & publish
        working-directory: upr-desktop
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
