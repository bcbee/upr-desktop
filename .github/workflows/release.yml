name: release

# Build, sign/notarize, and publish to GitHub Releases on a version tag (e.g. v2.0.0).
#
# Prerequisites:
# - Push the latest send-keys-native and send-keys-native-windows to GitHub; this
#   workflow checks them out as siblings so the app's `file:../` deps resolve.
# - Required secrets:
#     GH_TOKEN                       PAT with `repo` scope (publish + sibling checkout)
#     MAC_CSC_LINK                   base64 of the Developer ID Application .p12
#     MAC_CSC_KEY_PASSWORD           password for that .p12
#     APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID   notarization creds

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Two gates before building:
  # 1. Artifacts and the update feed (latest*.yml) are stamped with package.json's
  #    version, not the tag - a mismatch publishes a release whose metadata points
  #    at the wrong version, which the installed clients then ignore or mis-download.
  # 2. Pre-create ONE draft release. electron-builder creates its draft lazily on
  #    first upload, and GitHub allows multiple drafts with the same tag name, so
  #    the parallel macOS/Windows jobs each mint their own draft unless one already
  #    exists for them to find by tag.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tag must match package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION. Bump package.json (or fix the tag) before releasing."
            exit 1
          fi
      - name: Create shared draft release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        # The publish target is brendancboyle/upr-desktop (see electron-builder.yml),
        # which installed clients' update feeds point at - not necessarily this repo.
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo brendancboyle/upr-desktop > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; build jobs will upload to it."
          else
            gh release create "$GITHUB_REF_NAME" --repo brendancboyle/upr-desktop \
              --draft --title "$GITHUB_REF_NAME" \
              --notes "Draft created by CI; electron-builder uploads artifacts here. Review, then publish."
          fi

  macos:
    needs: prepare
    runs-on: macos-14 # arm64 runner; builds a universal macOS artifact
    steps:
      - uses: actions/checkout@v5
        with:
          path: upr-desktop
      - uses: actions/checkout@v5
        with:
          repository: brendancboyle/send-keys-native
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native
      - uses: actions/checkout@v5
        with:
          repository: brendancboyle/send-keys-native-windows
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native-windows
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install
        working-directory: upr-desktop
        run: npm install
      - name: Build
        working-directory: upr-desktop
        run: npm run build
      - name: Package, sign, notarize & publish
        working-directory: upr-desktop
        run: npx electron-builder --mac --universal --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: upr-desktop
      - uses: actions/checkout@v5
        with:
          repository: brendancboyle/send-keys-native
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native
      - uses: actions/checkout@v5
        with:
          repository: brendancboyle/send-keys-native-windows
          token: ${{ secrets.GH_TOKEN }}
          path: send-keys-native-windows
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install (compiles the native addon for the Electron ABI)
        working-directory: upr-desktop
        run: npm install --include=optional
      - name: Install Windows native dependency
        working-directory: upr-desktop
        shell: pwsh
        run: |
          # npm 11 on the hosted Windows runner can skip this local optional
          # dependency even with --include=optional. Install the checked-out
          # sibling explicitly so electron-builder can package and rebuild it.
          npm install --no-save ../send-keys-native-windows
          node -e "require.resolve('send-keys-native-windows')"
      - name: Build
        working-directory: upr-desktop
        run: npm run build
      - name: Package & publish
        working-directory: upr-desktop
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
