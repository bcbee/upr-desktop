appId: com.universalpresenterremote.desktop
productName: Universal Presenter Remote
copyright: Copyright © 2026 Brendan Boyle

directories:
  buildResources: build
  output: release

afterPack: build/verify-native-deps.cjs

extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: build/icon.png
    to: icon.png

# Pack the electron-vite output + node_modules; drop TS source & maps.
files:
  - out/**/*
  - package.json
  # CI has previously published a Windows artifact where electron-builder copied
  # the JS wrapper but skipped this optional file: dependency. Include it
  # explicitly so the runtime require is satisfied in the installed app.
  - node_modules/send-keys-native-windows/**/*
  - "!**/*.{ts,tsx,map}"
  # send-keys-native is a file: link to a sibling checkout; electron-builder copies
  # its real directory wholesale, including any locally installed dev node_modules
  # (jest etc.). Exclude them — send-keys-native-windows resolves from the app's
  # root node_modules, where it is a direct optionalDependency.
  - "!**/node_modules/send-keys-native/node_modules/**"

asar: true
# The Windows native keystroke addon must live outside the asar so dlopen works.
asarUnpack:
  - "**/node_modules/send-keys-native-windows/**"

# Rebuild native modules against the Electron ABI (compiles send-keys-native-windows).
npmRebuild: true

mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  # zip is REQUIRED for electron-updater on macOS (Squirrel.Mac downloads the zip).
  # Universal macOS artifacts let Rosetta x64 installs update into a native build.
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  artifactName: upr-desktop-${version}-${arch}-mac.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSAppleEventsUsageDescription: >-
      Universal Presenter Remote sends arrow-key presses to your presentation
      software to advance and reverse slides.

dmg:
  artifactName: upr-desktop-${version}-${arch}-mac.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName: upr-desktop-${version}-setup.${ext}
  oneClick: true
  perMachine: false

publish:
  provider: github
  owner: brendancboyle
  repo: upr-desktop
