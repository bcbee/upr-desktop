appId: com.universalpresenterremote.desktop
productName: Universal Presenter Remote
copyright: Copyright © 2026 Brendan Boyle

directories:
  buildResources: build
  output: release

extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: build/icon.png
    to: icon.png

# Pack the electron-vite output + node_modules; drop TS source & maps.
files:
  - out/**/*
  - package.json
  - "!**/*.{ts,tsx,map}"

asar: true

mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  # zip is REQUIRED for electron-updater on macOS (Squirrel.Mac downloads the zip).
  # Universal macOS artifacts let Rosetta x64 installs update into a native build.
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  artifactName: upr-desktop-${version}-${arch}-mac.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSAppleEventsUsageDescription: >-
      Universal Presenter Remote sends arrow-key presses to your presentation
      software to advance and reverse slides.

dmg:
  artifactName: upr-desktop-${version}-${arch}-mac.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: build/icon.ico
  extraResources:
    - from: native/win-keysender/build/Release/keysender.node
      to: native/keysender.node
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName: upr-desktop-${version}-setup.${ext}
  oneClick: true
  perMachine: false

publish:
  provider: github
  owner: brendancboyle
  repo: upr-desktop
